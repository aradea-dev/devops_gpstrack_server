# =========================================================================
# 1. INDUK UPSTREAM (Pemeriksaan Kesehatan Otomatis di Sisi Nginx)
# =========================================================================
upstream gps_backend_cluster {
    # Nginx akan memantau container backend-service.
    # Jika gagal merespons sebanyak 3 kali dalam waktu 10 detik, 
    # Nginx akan menganggap backend "sakit" dan berhenti mengirim traffic ke sana selama 10 detik.
    server backend-service:3000 max_fails=3 fail_timeout=10s;
}

# =========================================================================
# 2. BLOK HTTP (Otomatis Redirect ke HTTPS)
# =========================================================================
server {
    listen 80;
    server_name gps-tracking.local;
    return 301 https://$host$request_uri; 
}

# =========================================================================
# 3. BLOK HTTPS (Main Server)
# =========================================================================
server {
    listen 443 ssl;
    server_name gps-tracking.local;

    # Pengaturan Sertifikat SSL dari mkcert
    ssl_certificate /etc/nginx/certs/gps-tracking.local.pem;
    ssl_certificate_key /etc/nginx/certs/gps-tracking.local-key.pem;

    # Optimasi Protokol SSL/TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # [JALUR FRONTEND]: Jika akses biasa, berikan file HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # [JALUR BACKEND WEBSOCKET]: Jika ada request ke /ws, lempar ke Upstream Cluster
    location /ws {
        # DI SINI PERUBAHANNYA: Diarahkan ke nama upstream di atas, bukan langsung ke port container
        proxy_pass http://gps_backend_cluster; 

        # Pengaturan Wajib Nginx agar mendukung WebSocket (Upgrade Protocol)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Menjaga koneksi tracker tidak mudah putus (24 jam)
        proxy_read_timeout 86400s; 
    }
}
