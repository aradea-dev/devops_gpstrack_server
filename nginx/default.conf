server {
    listen 80;
    #server_name localhost;
     server_name gps-tracking.local;
     return 301 https://$host$request_uri; # Otomatis redirect HTTP ke HTTPS
}

server {

    listen 443 ssl;
    server_name gps-tracking.local;

    # Pengaturan Sertifikat SSL dari mkcert
    # Sesuaikan path ini dengan lokasi file di dalam container Nginx kamu!
    ssl_certificate /etc/nginx/certs/gps-tracking.local.pem;
    ssl_certificate_key /etc/nginx/certs/gps-tracking.local-key.pem;

    # Optimasi Protokol SSL/TLS (Opsional tapi sangat disarankan)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;


    # 1. JALUR FRONTEND: Jika akses biasa, berikan file HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. JALUR BACKEND WEBSOCKET: Jika ada request ke /ws, lempar ke Node.js port 3000
    location /ws {
        proxy_pass http://backend-service:3000; # 'backend-service' sesuai nama container di docker
        
        # Pengaturan Wajib Nginx agar mendukung WebSocket (Upgrade Protocol)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s; # Menjaga koneksi tracker tidak mudah putus
    }
}
