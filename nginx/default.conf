server {
    listen 80;
    server_name localhost;

    # 1. JALUR FRONTEND: Jika akses biasa, berikan file HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. JALUR BACKEND WEBSOCKET: Jika ada request ke /ws, lempar ke Node.js port 3000
    location /ws {
        proxy_pass http://gps_backend:3000; # 'backend-service' sesuai nama container di docker
        
        # Pengaturan Wajib Nginx agar mendukung WebSocket (Upgrade Protocol)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s; # Menjaga koneksi tracker tidak mudah putus
    }
}
