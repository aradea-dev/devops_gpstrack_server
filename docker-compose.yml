version: '3.8'

services:
  db-gps:
    image: postgres:15
    container_name: database_gps_dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-service:
    build: ./backend
    container_name: gps_backend
    restart: always # <--- TAMBAHKAN BARIS INI (Sangat Penting untuk Auto-Restart)
    ports:
      - "3000:3000"
    environment:
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}

    # ======= check backend healty =======
    healthcheck:
      #test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      #test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      test: ["CMD", "sh", "-c", "Status=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/); [ $$Status -eq 200 ] || [ $$Status -eq 426 ]"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    # ==================================

    depends_on:
      db-gps:
        condition: service_healthy

  web-nginx:
    image: nginx:alpine
    container_name: gps_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Masukkan file HTML frontend ke dalam Nginx
      - ./frontend:/usr/share/nginx/html
      # Masukkan konfigurasi Nginx kita ke dalam container
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # SSL
      - ./certs:/etc/nginx/certs # <--- MAP FOLDER SERTIFIKAT KE SINI    
    depends_on:
      - backend-service
      #backend-service:
        #condition: "service_healty" # check healty
