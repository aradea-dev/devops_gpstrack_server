version: '3.8'

services:
  db-gps:
    image: postgres:15
    container_name: database_gps_dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-service:
    build: ./backend
    container_name: gps_backend
    ports:
      - "3000:3000"
    environment:
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
    depends_on:
      db-gps:
        condition: service_healthy

  web-nginx:
    image: nginx:alpine
    container_name: gps_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Masukkan file HTML frontend ke dalam Nginx
      - ./frontend:/usr/share/nginx/html
      # Masukkan konfigurasi Nginx kita ke dalam container
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # SSL
      - ./certs:/etc/nginx/certs # <--- MAP FOLDER SERTIFIKAT KE SINI    
    depends_on:
      - backend-service
